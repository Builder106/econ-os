<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Pin background BEFORE Tailwind CDN loads to avoid the white flash
         visible in screen recordings and on very slow connections. -->
    <style>html,body{background:#0a0b0e;color:#fff;margin:0}</style>
    <meta name="theme-color" content="#0a0b0e">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>EconOS | Economic Operating System</title>
    <meta name="description" content="A live multi-agent reinforcement-learning economic simulation, running as a shared mainframe. Twelve RL agents trading continuously — same simulation every visitor sees.">

    <!-- Open Graph (Discord, Slack, LinkedIn, iMessage, Facebook, etc.) -->
    <meta property="og:title" content="EconOS — Economic Operating System">
    <meta property="og:description" content="A live multi-agent RL economy running as a shared mainframe. 12 agents · PettingZoo + PPO · WebSocket fan-out.">
    <meta property="og:image" content="https://econ-os.vercel.app/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:alt" content="EconOS — large cyan EconOS wordmark beside a live wage/price chart on a dark glassmorphic background.">
    <meta property="og:url" content="https://econ-os.vercel.app">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="EconOS">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="EconOS — Economic Operating System">
    <meta name="twitter:description" content="A live multi-agent RL economy running as a shared mainframe. 12 agents · PettingZoo + PPO · WebSocket fan-out.">
    <meta name="twitter:image" content="https://econ-os.vercel.app/og-image.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="styles.css">
    <!-- Kernel URL config (regenerated at deploy time from ECONOS_KERNEL_WS_URL env var). -->
    <script src="config.js"></script>
    <!-- Vercel Analytics (vanilla-JS / static path). The /_vercel/insights/* route is
         auto-served by Vercel's edge for any deployed project; no package install needed. -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="bg-black text-white/80 font-sans overflow-hidden">

    <div id="desktop">
        
        <!-- Desktop Icons -->
        <div id="desktop-icons">
            <div class="desktop-icon" onclick="launchWindow('process-explorer')" data-tip="Open Process Explorer — every agent's balance + last reward, per tick">
                <i class="ph-fill ph-cpu"></i>
                <span>Processes</span>
            </div>
            <div class="desktop-icon" onclick="launchWindow('macro-monitor')" data-tip="Open Macro Monitor — live wage, price, Gini, treasury, total liquidity">
                <i class="ph-fill ph-chart-line-up"></i>
                <span>Macro Viz</span>
            </div>
            <div class="desktop-icon" onclick="launchWindow('econ-shell')" data-tip="Open the Econ Shell — read-only inspection commands; sudo for Fed mode">
                <i class="ph-fill ph-terminal-window"></i>
                <span>Econ Shell</span>
            </div>
        </div>

        <!-- Taskbar -->
        <div id="taskbar">
            <div class="task-icon text-terminal-gold" onclick="launchWindow('system-menu')" data-tip="System menu"><i class="ph-fill ph-microsoft-logo"></i></div>
            <div class="h-6 w-[1px] bg-white/10 mx-2"></div>
            <div class="task-icon" onclick="launchWindow('macro-monitor')" data-tip="Macro Monitor"><i class="ph ph-chart-line"></i></div>
            <div class="task-icon" onclick="launchWindow('process-explorer')" data-tip="Process Explorer"><i class="ph ph-cpu"></i></div>
            <div class="task-icon" onclick="launchWindow('econ-shell')" data-tip="Econ Shell"><i class="ph ph-terminal"></i></div>
            <div class="task-icon" onclick="launchWindow('policy-manager')" data-tip="Policy Manager (Fed mode)"><i class="ph ph-gear"></i></div>
            <div class="task-icon" onclick="launchWindow('about')" data-tip="What is EconOS?"><i class="ph ph-question"></i></div>

            <div class="ml-auto flex items-center gap-4 px-4 font-mono text-[10px] text-white/40">
                <span id="sys-time">23:25:51</span>
                <span>ECONOS v5.4</span>
            </div>
        </div>

    </div>

    <script src="main.js"></script>
</body>
</html>
