<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="EconOS — Economic Operating System">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b24"/>
      <stop offset="100%" stop-color="#0a0b0e"/>
    </linearGradient>
    <radialGradient id="cyanHaze" cx="20%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background + ambient cyan haze behind the title -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#cyanHaze)"/>

  <!-- Subtle horizontal grid for "data" feel -->
  <g stroke="rgba(255,255,255,0.045)" stroke-width="1">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
  </g>

  <!-- Top status strip -->
  <g transform="translate(80, 78)">
    <circle cx="0" cy="-4" r="6" fill="#00FF41"/>
    <text x="16" y="0" font-family="ui-monospace, Menlo, Monaco, 'JetBrains Mono', monospace"
          font-size="14" fill="rgba(255,255,255,0.55)" letter-spacing="3.5">LIVE · MULTI-TENANT · SHARED MAINFRAME</text>
  </g>

  <!-- Title block -->
  <text x="80" y="248" font-family="Inter, system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="132" font-weight="800" fill="#00F5FF" letter-spacing="-4">EconOS</text>

  <!-- Wordmark spelled out -->
  <text x="80" y="294" font-family="ui-monospace, Menlo, Monaco, 'JetBrains Mono', monospace"
        font-size="22" fill="rgba(255,255,255,0.55)" letter-spacing="6">ECONOMIC · OPERATING · SYSTEM</text>

  <!-- Tagline -->
  <text x="80" y="394" font-family="Inter, system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="34" font-weight="500" fill="rgba(255,255,255,0.88)">A live multi-agent RL economy</text>
  <text x="80" y="440" font-family="Inter, system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="34" font-weight="500" fill="rgba(255,255,255,0.88)">running as a shared mainframe.</text>

  <!-- Stack line -->
  <text x="80" y="498" font-family="Inter, system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="20" fill="rgba(255,255,255,0.55)">12 agents · PettingZoo + PPO · FastAPI · WebSocket fan-out</text>

  <!-- Chart panel (right) — mimics the macro monitor -->
  <g transform="translate(720, 195)">
    <rect x="0" y="0" width="400" height="240" rx="6"
          fill="rgba(0,245,255,0.035)" stroke="rgba(0,245,255,0.22)" stroke-width="1"/>

    <!-- Chart header -->
    <text x="18" y="26" font-family="ui-monospace, Menlo, Monaco, 'JetBrains Mono', monospace"
          font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="2.5">MARKET · WAGE / PRICE</text>
    <circle cx="376" cy="22" r="4" fill="#00FF41"/>
    <text x="370" y="26" font-family="ui-monospace, monospace" font-size="11"
          fill="#00FF41" text-anchor="end" letter-spacing="2">LIVE</text>

    <!-- Chart grid -->
    <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
      <line x1="20" y1="80"  x2="380" y2="80"/>
      <line x1="20" y1="130" x2="380" y2="130"/>
      <line x1="20" y1="180" x2="380" y2="180"/>
    </g>

    <!-- Wage line (gold) -->
    <polyline fill="none" stroke="#FFD700" stroke-width="2.5" stroke-linejoin="round"
              points="20,170 50,158 80,162 110,138 140,120 170,108 200,118 230,98 260,86 290,78 320,82 350,68 380,60"/>
    <!-- Price line (cyan) -->
    <polyline fill="none" stroke="#00F5FF" stroke-width="2.5" stroke-linejoin="round"
              points="20,200 50,188 80,170 110,162 140,148 170,156 200,140 230,128 260,138 290,118 320,108 350,116 380,98"/>

    <!-- Legend -->
    <g transform="translate(18, 218)" font-family="ui-monospace, Menlo, monospace" font-size="11">
      <rect x="0" y="-9" width="14" height="3" fill="#FFD700"/>
      <text x="20" y="-1" fill="#FFD700">WAGE</text>
      <rect x="80" y="-9" width="14" height="3" fill="#00F5FF"/>
      <text x="100" y="-1" fill="#00F5FF">PRICE</text>
    </g>
  </g>

  <!-- Footer URL -->
  <text x="1120" y="590" font-family="ui-monospace, Menlo, Monaco, 'JetBrains Mono', monospace"
        font-size="18" fill="rgba(255,255,255,0.42)" text-anchor="end">github.com/Builder106/EconOS</text>
</svg>
