# Tailscale Funnel deploy: tailscale (host-installed, not dockerized) terminates
# TLS at Tailscale's edge and proxies https://<host>.<tailnet>.ts.net → 127.0.0.1:8000
# on this machine. The kernel container therefore publishes only on the host
# loopback — never on the public IP.
#
# `setup.sh` installs Tailscale and runs `tailscale serve` + `tailscale funnel`
# automatically after the user logs in via `sudo tailscale up`.

services:
  kernel:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=8000
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
