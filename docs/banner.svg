<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="EconOS — Economic Operating System">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1a1b24"/>
      <stop offset="100%" stop-color="#0a0b0e"/>
    </linearGradient>
    <radialGradient id="cyanHaze" cx="22%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#00F5FF" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background + ambient cyan haze near the wordmark -->
  <rect width="1280" height="320" fill="url(#bgGrad)"/>
  <rect width="1280" height="320" fill="url(#cyanHaze)"/>

  <!-- Subtle horizontal grid for "data" feel -->
  <g stroke="rgba(255,255,255,0.045)" stroke-width="1">
    <line x1="0" y1="80"  x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
  </g>

  <!-- Status strip — green dot + caption -->
  <g transform="translate(70, 56)">
    <circle cx="0" cy="-4" r="5" fill="#00FF41"/>
    <text x="14" y="0" font-family="ui-monospace, Menlo, Monaco, 'JetBrains Mono', monospace"
          font-size="12" fill="rgba(255,255,255,0.55)" letter-spacing="3.5">LIVE · MULTI-TENANT · SHARED MAINFRAME</text>
  </g>

  <!-- EconOS wordmark -->
  <text x="70" y="180" font-family="Inter, system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="108" font-weight="800" fill="#00F5FF" letter-spacing="-3">EconOS</text>

  <!-- Subtitle, monospace, tracked-out -->
  <text x="74" y="212" font-family="ui-monospace, Menlo, Monaco, 'JetBrains Mono', monospace"
        font-size="14" fill="rgba(255,255,255,0.55)" letter-spacing="5">ECONOMIC · OPERATING · SYSTEM</text>

  <!-- Tagline -->
  <text x="70" y="258" font-family="Inter, system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="20" font-weight="500" fill="rgba(255,255,255,0.82)">A live multi-agent RL economy running as a shared mainframe.</text>

  <!-- Stack line -->
  <text x="70" y="284" font-family="Inter, system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="13" fill="rgba(255,255,255,0.5)">12 agents · PettingZoo + PPO · FastAPI · WebSocket fan-out</text>

  <!-- Macro Monitor mock panel (right) -->
  <g transform="translate(810, 50)">
    <rect x="0" y="0" width="400" height="220" rx="5"
          fill="rgba(0,245,255,0.035)" stroke="rgba(0,245,255,0.22)" stroke-width="1"/>

    <!-- Header -->
    <text x="14" y="22" font-family="ui-monospace, Menlo, Monaco, 'JetBrains Mono', monospace"
          font-size="10" fill="rgba(255,255,255,0.42)" letter-spacing="2.5">MARKET · WAGE / PRICE</text>
    <circle cx="378" cy="18" r="3.5" fill="#00FF41"/>
    <text x="370" y="22" font-family="ui-monospace, monospace" font-size="10"
          fill="#00FF41" text-anchor="end" letter-spacing="2">LIVE</text>

    <!-- Grid -->
    <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
      <line x1="20" y1="70"  x2="380" y2="70"/>
      <line x1="20" y1="120" x2="380" y2="120"/>
      <line x1="20" y1="170" x2="380" y2="170"/>
    </g>

    <!-- Wage line (gold) -->
    <polyline fill="none" stroke="#FFD700" stroke-width="2.2" stroke-linejoin="round"
              points="20,160 50,148 80,152 110,128 140,108 170,98 200,110 230,90 260,78 290,68 320,72 350,58 380,52"/>
    <!-- Price line (cyan) -->
    <polyline fill="none" stroke="#00F5FF" stroke-width="2.2" stroke-linejoin="round"
              points="20,190 50,178 80,162 110,154 140,138 170,148 200,132 230,120 260,130 290,108 320,98 350,108 380,90"/>

    <!-- Legend -->
    <g transform="translate(18, 200)" font-family="ui-monospace, Menlo, monospace" font-size="10">
      <rect x="0" y="-9" width="13" height="3" fill="#FFD700"/>
      <text x="19" y="-1" fill="#FFD700">WAGE</text>
      <rect x="76" y="-9" width="13" height="3" fill="#00F5FF"/>
      <text x="95" y="-1" fill="#00F5FF">PRICE</text>
    </g>
  </g>
</svg>
